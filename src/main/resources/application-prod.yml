server:
  forward-headers-strategy: native
  tomcat:
    remoteip:
      protocol-header: x-forwarded-proto
      remote-ip-header: x-forwarded-for
spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver # 만약 RDS(MySQL)를 사용하신다면 변경 필요
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update # 테이블이 없으면 생성, 있으면 수정 (운영 초기 단계에 유용)
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # ── OAuth2 소셜 로그인 설정 ──────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: "https://api.greenpath-soeul.store/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
            client-name: Kakao

          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "https://api.greenpath-soeul.store/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
            client-name: Naver

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# ── JWT 설정 ───────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-token-validity-seconds: 1800 # 30분
  refresh-token-validity-seconds: 1209600 # 14일

# ── 프론트엔드 및 CORS 설정 ───────────────────────────────────
frontend:
  url: ${FRONTEND_URL}

cors:
  allowed-origins: ${FRONTEND_URL}

logging:
  level:
    root: INFO
    org.hibernate: INFO   # DEBUG에서 INFO로 변경하여 쿼리 로그 축소
    org.springframework.security: INFO # 보안 로그 축소
